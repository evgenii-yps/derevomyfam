<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f0eb;--bg2:#ede7df;--card:#fffcf8;--text:#2c2418;--text2:#6b5d4f;--text3:#9e8e7c;--accent:#8b6f47;--accent-light:#d4c4a8;--border:#d9cfc2;--shadow-hover:0 8px 32px rgba(44,36,24,.14);--radius:12px;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Nunito Sans',system-ui,sans-serif;--male:#5a7a8c;--female:#8c5a6b;--deceased:#9e8e7c}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(200,169,110,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(139,111,71,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
.header{position:sticky;top:0;z-index:100;background:rgba(245,240,235,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:var(--serif);font-size:1.6rem;font-weight:600;color:var(--accent)}
.logo span{font-weight:300;color:var(--text3);margin-left:6px}
.nav{display:flex;gap:4px}
.nav-btn{font-family:var(--sans);font-size:.85rem;font-weight:600;padding:8px 16px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;transition:all .2s}
.nav-btn:hover{background:var(--bg2);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}
.hero{text-align:center;padding:80px 24px 60px;position:relative;z-index:1}
.hero h1{font-family:var(--serif);font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;color:var(--text);line-height:1.1;margin-bottom:12px}
.hero h1 strong{font-weight:700;color:var(--accent)}
.hero p{font-size:1.05rem;color:var(--text3);max-width:500px;margin:0 auto;line-height:1.6}
.hero-line{width:60px;height:2px;background:var(--accent-light);margin:24px auto 0}
.stats{display:flex;justify-content:center;gap:48px;padding:0 24px 60px;position:relative;z-index:1;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:var(--serif);font-size:2.8rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.8rem;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-top:4px}
.search-wrap{max-width:500px;margin:0 auto 40px;padding:0 24px;position:relative;z-index:1}
.search-input{width:100%;padding:14px 20px 14px 48px;border:1px solid var(--border);border-radius:50px;background:var(--card);font-family:var(--sans);font-size:.95rem;color:var(--text);outline:none;transition:all .2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,111,71,.1)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:42px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.filters{display:flex;justify-content:center;gap:8px;padding:0 24px 40px;flex-wrap:wrap;position:relative;z-index:1}
.filter-btn{font-family:var(--sans);font-size:.78rem;font-weight:600;padding:6px 14px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;border-radius:20px;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--accent-light);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.gen-section{max-width:1200px;margin:0 auto 48px;padding:0 24px;position:relative;z-index:1}
.gen-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.gen-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.gen-title{font-family:var(--serif);font-size:1.5rem;font-weight:600;color:var(--text)}
.gen-count{font-size:.8rem;color:var(--text3);margin-left:4px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.person-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.person-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--accent-light)}
.person-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .3s}
.person-card:hover::before{opacity:1}
.person-card.male::before{background:var(--male)}
.person-card.female::before{background:var(--female)}
.card-relation{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px;font-weight:600}
.card-name{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
.card-maiden{font-size:.8rem;color:var(--text3);font-style:italic;margin-bottom:6px}
.card-dates{font-size:.82rem;color:var(--text2);display:flex;align-items:center;gap:6px}
.card-alive{display:inline-block;width:6px;height:6px;background:#6b9e5e;border-radius:50%;margin-right:4px}
.card-deceased{color:var(--deceased)}
.card-ya{position:absolute;top:12px;right:12px;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.08em}
.modal-overlay{position:fixed;inset:0;background:rgba(44,36,24,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:16px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;padding:32px;box-shadow:0 24px 80px rgba(44,36,24,.25);transform:scale(.95);transition:transform .3s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text3);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--bg2);color:var(--text)}
.modal-relation{font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:700;margin-bottom:8px}
.modal-name{font-family:var(--serif);font-size:1.8rem;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:4px}
.modal-maiden{font-size:.9rem;color:var(--text3);font-style:italic;margin-bottom:16px}
.modal-dates{font-size:.95rem;color:var(--text2);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-weight:700;margin-bottom:6px}
.modal-relatives{display:flex;flex-wrap:wrap;gap:6px}
.modal-rel-tag{font-size:.78rem;padding:4px 10px;background:var(--bg2);border-radius:6px;color:var(--text2);cursor:pointer;transition:all .2s}
.modal-rel-tag:hover{background:var(--accent-light);color:var(--accent)}
.footer{text-align:center;padding:40px 24px;border-top:1px solid var(--border);color:var(--text3);font-size:.8rem;position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both}
@media(max-width:640px){.hero{padding:48px 16px 36px}.hero h1{font-size:2rem}.stats{gap:24px}.stat-num{font-size:2rem}.cards-grid{grid-template-columns:1fr}.header-inner{height:56px}.logo{font-size:1.2rem}.nav-btn{font-size:.75rem;padding:6px 10px}}
.tree-container{position:relative;z-index:1;margin:0 auto}
.tree-zoom{position:sticky;top:64px;z-index:10;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;background:rgba(245,240,235,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.tree-zoom button{width:32px;height:32px;border:1px solid var(--border);background:var(--card);border-radius:8px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:var(--sans)}
.tree-zoom button:hover{background:var(--bg2);color:var(--accent)}
.tree-zoom span{font-size:.8rem;color:var(--text2);min-width:44px;text-align:center;font-weight:600}
.tree-scroll{overflow:auto;height:calc(100vh - 64px - 45px);background:var(--bg)}
.tree-canvas-outer{transform-origin:top left;position:relative}
.tree-node{position:absolute;width:140px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;text-align:center;transition:box-shadow .2s,border-color .2s;z-index:2;overflow:hidden}
.tree-node:hover{box-shadow:var(--shadow-hover);border-color:var(--accent-light)}
.tree-node.male{border-top:3px solid var(--male)}
.tree-node.female{border-top:3px solid var(--female)}
.tree-node.me{border:2px solid #c8a96e;box-shadow:0 0 16px rgba(200,169,110,.35)}
.tree-node .tn-name{font-family:var(--serif);font-size:.78rem;font-weight:600;color:var(--text);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-node .tn-dates{font-size:.62rem;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-node .tn-ya{position:absolute;top:4px;right:4px;background:var(--accent);color:#fff;font-size:.55rem;font-weight:700;padding:1px 5px;border-radius:6px;letter-spacing:.05em}
.tree-gen-label{position:absolute;left:4px;width:94px;text-align:right;padding-right:8px;font-family:var(--serif);font-size:.75rem;font-weight:600;color:var(--text3);z-index:3;line-height:1.2}
.tree-lines{position:absolute;top:0;left:0;pointer-events:none;z-index:1}
.tree-couple-line{position:absolute;height:2px;background:var(--accent-light);z-index:3}
</style>
</head>

function parseDateStr(d){if(!d)return null;const p=d.split("–").map(s=>s.trim());const b=p[0];if(!b||b==="?")return null;const m=b.match(/(\d{2})\.(\d{2})\.(\d{4})/);if(m)return{day:+m[1],month:+m[2],year:+m[3]};const m2=b.match(/(\d{4})/);if(m2)return{year:+m2[1]};return null}
function isDeceased(d){return d?d.includes("–")&&d.split("–")[1].trim()!=="":false}

function PersonCard({person,onClick}){return(<div className={`person-card fade-up ${person.gender==='m'?'male':'female'}`} onClick={()=>onClick(person)}>{person.isMe&&<div className="card-ya">Я</div>}{person.relation&&<div className="card-relation">{person.relation}</div>}<div className="card-name">{person.name}</div>{person.maiden&&<div className="card-maiden">урожд. {person.maiden}</div>}{person.dates&&<div className={`card-dates ${isDeceased(person.dates)?'card-deceased':''}`}>{!isDeceased(person.dates)&&person.dates&&<span className="card-alive"/>}<CalendarIcon/>{person.dates}</div>}</div>)}
function Modal({person,onClose,onNavigate}){if(!person)return null;const ch=people.filter(p=>p.parents&&p.parents.includes(person.id));const pa=people.filter(p=>person.parents&&person.parents.includes(p.id));const sp=people.filter(p=>(person.spouses&&person.spouses.includes(p.id))||(p.spouses&&p.spouses.includes(person.id)));const si=people.filter(p=>p.id!==person.id&&person.parents&&person.parents.length>0&&p.parents&&p.parents.some(pid=>person.parents.includes(pid)));return(<div className="modal-overlay open" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{position:'relative'}}><button className="modal-close" onClick={onClose}>&times;</button>{person.relation&&<div className="modal-relation">{person.relation}</div>}<div className="modal-name">{person.name}</div>{person.maiden&&<div className="modal-maiden">урожд. {person.maiden}</div>}{person.dates&&<div className="modal-dates"><CalendarIcon/> {person.dates}{isDeceased(person.dates)&&" ✝"}</div>}{sp.length>0&&<div className="modal-section"><div className="modal-section-title">{person.gender==='m'?'Супруга':'Супруг'}</div><div className="modal-relatives">{sp.map(s=><span key={s.id} className="modal-rel-tag" onClick={()=>onNavigate(s)}>{s.name.split(' ').slice(0,2).join(' ')}</span>)}</div></div>}{pa.length>0&&<div className="modal-section"><div className="modal-section-title">Родители</div><div className="modal-relatives">{pa.map(p=><span key={p.id} className="modal-rel-tag" onClick={()=>onNavigate(p)}>{p.name.split(' ').slice(0,2).join(' ')}</span>)}</div></div>}{si.length>0&&<div className="modal-section"><div className="modal-section-title">Братья и сёстры</div><div className="modal-relatives">{si.map(s=><span key={s.id} className="modal-rel-tag" onClick={()=>onNavigate(s)}>{s.name.split(' ').slice(0,2).join(' ')}</span>)}</div></div>}{ch.length>0&&<div className="modal-section"><div className="modal-section-title">Дети</div><div className="modal-relatives">{ch.map(c=><span key={c.id} className="modal-rel-tag" onClick={()=>onNavigate(c)}>{c.name.split(' ').slice(0,2).join(' ')}</span>)}</div></div>}</div></div>)}
function TreeView({onSelect}){
const scrollRef=useRef(null);
const[scale,setScale]=useState(0.8);
const NODE_W=140,NODE_H=52,GAP_X=28,GAP_Y=80,COUPLE_GAP=12,PAD_LEFT=110,PAD_TOP=24;
const ROW_H=NODE_H+GAP_Y;
const{positions,lines,coupleLinks,totalW,totalH,genKeys}=useMemo(()=>{
const byId={};people.forEach(p=>byId[p.id]=p);
const gens={};people.forEach(p=>{if(!gens[p.generation])gens[p.generation]=[];gens[p.generation].push(p)});
const genKeys=Object.keys(gens).map(Number).sort((a,b)=>a-b);
const positions={};const coupleLinks=[];
genKeys.forEach(gen=>{
const persons=gens[gen];const used=new Set();const units=[];
persons.forEach(p=>{
if(used.has(p.id))return;used.add(p.id);
const members=[p];
const allSp=[...(p.spouses||[])];
persons.forEach(q=>{if(q.spouses&&q.spouses.includes(p.id)&&!allSp.includes(q.id))allSp.push(q.id)});
allSp.forEach(sid=>{if(byId[sid]&&byId[sid].generation===gen&&!used.has(sid)){used.add(sid);members.push(byId[sid])}});
units.push({members,parentIds:[...new Set(members.flatMap(m=>m.parents||[]))]});
});
units.forEach(u=>{
const pxs=u.parentIds.map(pid=>positions[pid]).filter(Boolean).map(p=>p.x+NODE_W/2);
u.sortKey=pxs.length>0?pxs.reduce((a,b)=>a+b,0)/pxs.length:99999;
});
units.sort((a,b)=>a.sortKey-b.sortKey);
let xPos=PAD_LEFT;
units.forEach(u=>{
const pxs=u.parentIds.map(pid=>positions[pid]).filter(Boolean).map(p=>p.x+NODE_W/2);
if(pxs.length>0){
const parentCenter=pxs.reduce((a,b)=>a+b,0)/pxs.length;
const unitW=u.members.length*NODE_W+(u.members.length-1)*COUPLE_GAP;
const desired=parentCenter-unitW/2;
if(desired>xPos)xPos=desired;
}
u.members.forEach((m,i)=>{
positions[m.id]={x:xPos,y:PAD_TOP+gen*ROW_H};
xPos+=NODE_W;
if(i<u.members.length-1)xPos+=COUPLE_GAP;
});
if(u.members.length>=2){
const p1=positions[u.members[0].id];
const p2=positions[u.members[1].id];
coupleLinks.push({x1:p1.x+NODE_W,y:p1.y+NODE_H/2,x2:p2.x,y2:p2.y+NODE_H/2});
}
xPos+=GAP_X;
});
});
const lines=[];
people.forEach(child=>{
if(!child.parents||child.parents.length===0)return;
const cp=positions[child.id];if(!cp)return;
const pps=child.parents.map(pid=>positions[pid]).filter(Boolean);
if(pps.length===0)return;
const pmx=pps.reduce((s,p)=>s+p.x+NODE_W/2,0)/pps.length;
const py=pps[0].y+NODE_H;
const cx=cp.x+NODE_W/2;
const cy=cp.y;
const my=(py+cy)/2;
lines.push(`M${pmx} ${py} L${pmx} ${my} L${cx} ${my} L${cx} ${cy}`);
});
const allPos=Object.values(positions);
const totalW=Math.max(...allPos.map(p=>p.x))+NODE_W+60;
const totalH=Math.max(...allPos.map(p=>p.y))+NODE_H+60;
return{positions,lines,coupleLinks,totalW,totalH,genKeys};
},[]);
useEffect(()=>{
if(!scrollRef.current)return;
const me=people.find(p=>p.isMe);
if(!me||!positions[me.id])return;
const pos=positions[me.id];const el=scrollRef.current;
el.scrollLeft=pos.x*scale-el.clientWidth/2+NODE_W*scale/2;
el.scrollTop=pos.y*scale-el.clientHeight/2+NODE_H*scale/2;
},[]);
return(<div className="tree-container">
<div className="tree-zoom">
<button onClick={()=>setScale(s=>Math.min(s+0.1,1.5))}>+</button>
<span>{Math.round(scale*100)}%</span>
<button onClick={()=>setScale(s=>Math.max(s-0.1,0.3))}>−</button>
</div>
<div className="tree-scroll" ref={scrollRef}>
<div className="tree-canvas-outer" style={{width:totalW*scale,height:totalH*scale}}>
<div style={{transform:`scale(${scale})`,transformOrigin:'top left',position:'relative',width:totalW,height:totalH}}>
{genKeys.map(g=><div key={g} className="tree-gen-label" style={{top:PAD_TOP+g*ROW_H+NODE_H/2-10}}>{genLabels[g]||'Пок. '+g}</div>)}
<svg className="tree-lines" width={totalW} height={totalH}>
{lines.map((d,i)=><path key={i} d={d} fill="none" stroke="var(--border)" strokeWidth="1.5"/>)}
</svg>
{coupleLinks.map((c,i)=><div key={i} className="tree-couple-line" style={{left:c.x1,top:c.y-1,width:c.x2-c.x1,height:2}}/>)}
{people.map(p=>{const pos=positions[p.id];if(!pos)return null;return(
<div key={p.id} className={`tree-node ${p.gender==='m'?'male':'female'} ${p.isMe?'me':''}`}
style={{left:pos.x,top:pos.y,width:NODE_W,height:NODE_H}}
onClick={()=>onSelect(p)}>
{p.isMe&&<div className="tn-ya">Я</div>}
<div className="tn-name">{p.name.split(' ').slice(0,2).join(' ')}</div>
{p.dates&&<div className="tn-dates">{p.dates}</div>}
</div>)})}
</div>
</div>
</div>
</div>)}
function App(){const[view,setView]=useState("tree");const[search,setSearch]=useState("");const[genFilter,setGenFilter]=useState(null);const[selectedPerson,setSelectedPerson]=useState(null);const filtered=useMemo(()=>{let list=people;if(search){const q=search.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.maiden&&p.maiden.toLowerCase().includes(q))||(p.relation&&p.relation.toLowerCase().includes(q))||(p.dates&&p.dates.includes(q)))}if(genFilter!==null)list=list.filter(p=>p.generation===genFilter);return list},[search,genFilter]);const generations=useMemo(()=>{const g={};filtered.forEach(p=>{if(!g[p.generation])g[p.generation]=[];g[p.generation].push(p)});return Object.entries(g).sort((a,b)=>+a[0]-+b[0])},[filtered]);const total=people.length;const totalGen=new Set(people.map(p=>p.generation)).size;const oldest=Math.min(...people.map(p=>{const d=parseDateStr(p.dates);return d?d.year:9999}).filter(y=>y<9999));const birthdays=useMemo(()=>people.map(p=>{const d=parseDateStr(p.dates);return d&&d.month?{...p,bday:d}:null}).filter(Boolean).filter(p=>!isDeceased(p.dates)).sort((a,b)=>a.bday.month-b.bday.month||(a.bday.day||1)-(b.bday.day||1)),[]);return(<><header className="header"><div className="header-inner"><div className="logo">Бобровы<span>· родословная</span></div><nav className="nav"><button className={`nav-btn ${view==='tree'?'active':''}`} onClick={()=>setView('tree')}>Древо</button><button className={`nav-btn ${view==='list'?'active':''}`} onClick={()=>setView('list')}>Список</button><button className={`nav-btn ${view==='dates'?'active':''}`} onClick={()=>setView('dates')}>Даты</button></nav></div></header><section className="hero"><h1>Древо семьи <strong>Бобровых</strong></h1><p>Родословная нашей семьи — от прапрадедов до самых маленьких</p><div className="hero-line"/></section><section className="stats"><div className="stat"><div className="stat-num">{total}</div><div className="stat-label">человек</div></div><div className="stat"><div className="stat-num">{totalGen}</div><div className="stat-label">поколений</div></div><div className="stat"><div className="stat-num">{oldest<9999?oldest:'—'}</div><div className="stat-label">самая ранняя дата</div></div></section>{view==='tree'&&<TreeView onSelect={setSelectedPerson}/>}{view==='list'&&<><div className="search-wrap"><span className="search-icon"><SearchIcon/></span><input className="search-input" placeholder="Поиск по имени, фамилии, дате..." value={search} onChange={e=>setSearch(e.target.value)}/></div><div className="filters"><button className={`filter-btn ${genFilter===null?'active':''}`} onClick={()=>setGenFilter(null)}>Все</button>{Object.entries(genLabels).map(([g,label])=><button key={g} className={`filter-btn ${genFilter===+g?'active':''}`} onClick={()=>setGenFilter(+g)}>{label}</button>)}</div></>}{view==='list'&&generations.map(([gen,persons])=><section className="gen-section" key={gen}><div className="gen-header"><div className="gen-dot" style={{background:genColors[gen]||'#999'}}/><div className="gen-title">{genLabels[gen]||'Поколение '+gen}</div><div className="gen-count">{persons.length} чел.</div></div><div className="cards-grid">{persons.map(p=><PersonCard key={p.id} person={p} onClick={setSelectedPerson}/>)}</div></section>)}{view==='dates'&&<div style={{maxWidth:700,margin:'0 auto',padding:'0 24px 60px',position:'relative',zIndex:1}}><h2 style={{fontFamily:'var(--serif)',fontSize:'1.8rem',fontWeight:600,textAlign:'center',marginBottom:32,color:'var(--text)'}}>Дни рождения</h2><p style={{textAlign:'center',color:'var(--text3)',marginBottom:32,fontSize:'.9rem'}}>Живые родственники с известными датами</p>{birthdays.map(p=><div key={p.id} style={{display:'flex',alignItems:'center',gap:16,padding:'12px 16px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',marginBottom:8,cursor:'pointer'}} onClick={()=>setSelectedPerson(p)}><div style={{minWidth:56,textAlign:'center'}}><div style={{fontFamily:'var(--serif)',fontSize:'1.6rem',fontWeight:700,color:genColors[p.generation]||'var(--accent)',lineHeight:1}}>{p.bday.day||'?'}</div><div style={{fontSize:'.7rem',color:'var(--text3)',textTransform:'uppercase'}}>{monthNames[p.bday.month]}</div></div><div style={{flex:1}}><div style={{fontFamily:'var(--serif)',fontWeight:600,fontSize:'1rem',color:'var(--text)'}}>{p.name}</div>{p.relation&&<div style={{fontSize:'.75rem',color:'var(--text3)'}}>{p.relation}</div>}</div>{p.bday.year&&<div style={{fontSize:'.8rem',color:'var(--text3)'}}>{p.bday.year} г.р.</div>}</div>)}</div>}{selectedPerson&&<Modal person={selectedPerson} onClose={()=>setSelectedPerson(null)} onNavigate={setSelectedPerson}/>}<footer className="footer">Древо Бобровых · {new Date().getFullYear()} · Сделано с любовью для семьи</footer></>)}
